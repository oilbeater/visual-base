[project]
name = "bub-eye"
version = "0.1.0"
description = "Background screen recording with visual-tape integration for Bub (Intel Mac, v1)"
authors = [
    { name = "Mengxin Liu", email = "liumengxinfly@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "bub",
    "imageio-ffmpeg>=0.5.1",
    "loguru>=0.7",
    "pydantic-settings>=2.0",
]

[project.entry-points.bub]
eye = "bub_eye.plugin:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/bub_eye", "src/skills"]

[tool.hatch.build.targets.sdist]
only-include = ["src/bub_eye", "src/skills", "tests", "README.md", "pyproject.toml"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24",
]
